<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="canvas-size" content="820x312">
<title>Able · cover-facebook</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_brand.css">
<style>
  /* FB cover crops to 640x312 on mobile (centered). Keep content within
     a 640-wide center band. */
  html, body { width: 820px; height: 312px; margin: 0; padding: 0; background: #d9e8de; }
  .canvas {
    width: 820px; height: 312px;
    --wordmark-fs: 80px;
    --tagline-fs: 22px;
    --url-fs: 16px;
    --hero-url-gap: 14px;
  }
  .hero-mark { gap: 26px; padding: 0 90px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="hero-mark">
      <span class="wordmark">Able</span>
      <div class="tagline-block">
        <div class="tagline">An app built for entrepreneurs who struggle</div>
        <div class="tagline">to manage inconsistent income.</div>
      </div>
      <div class="url">becomeable.app</div>
    </div>
  </div>
</body>
</html>
