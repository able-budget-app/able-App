<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="canvas-size" content="1080x1350">
<title>Able · launch-01-character</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_brand.css">
<style>
  html, body { width: 1080px; height: 1350px; margin: 0; padding: 0; background: #E6EBE0; font-family: 'Bricolage Grotesque', -apple-system, sans-serif; }
  .canvas {
    width: 1080px; height: 1350px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: #E6EBE0;
    position: relative;
  }
  .left {
    padding: 96px 48px 96px 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .right {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .right img {
    width: 100%;
    height: auto;
    max-height: 1280px;
    object-fit: contain;
  }
  .eyebrow {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #2a7a4a;
    margin-bottom: 36px;
  }
  .headline {
    font-size: 48px;
    font-weight: 800;
    line-height: 1.06;
    letter-spacing: -.025em;
    color: #111c16;
    margin-bottom: 32px;
  }
  .subhead {
    font-size: 24px;
    font-weight: 500;
    line-height: 1.32;
    color: #4a5c52;
  }
  .footer-stack {
    display: flex;
    flex-direction: column;
    gap: 32px;
    align-items: flex-start;
  }
  .store-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    background: #000;
    color: #fff;
    border-radius: 12px;
    text-decoration: none;
  }
  .store-badge svg { width: 32px; height: 32px; flex-shrink: 0; }
  .store-badge__text { display: flex; flex-direction: column; line-height: 1.05; }
  .store-badge__text small { font-size: 12px; letter-spacing: .04em; opacity: .85; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 400; }
  .store-badge__text strong { font-size: 22px; font-weight: 600; letter-spacing: -.01em; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .wordmark { font-size: 56px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="left">
      <div>
        <div class="eyebrow">Built for inconsistent income</div>
        <h1 class="headline">An app built for people who struggle to budget inconsistent income.</h1>
        <p class="subhead">For freelancers, creators, and business owners.</p>
      </div>
      <div class="footer-stack">
        <a class="store-badge" href="#" aria-label="Download on the App Store">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          <span class="store-badge__text"><small>Download on the</small><strong>App Store</strong></span>
        </a>
        <span class="wordmark">Able</span>
      </div>
    </div>
    <div class="right">
      <img src="../marketing-footage/product-shots/01-dashboard/9x16-bare.png" alt="Able home screen">
    </div>
  </div>
</body>
</html>
