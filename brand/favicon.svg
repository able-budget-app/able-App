<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@900&amp;display=swap');
      .a { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-weight: 900; letter-spacing: -.04em; }
    </style>
  </defs>
  <!-- Brand rule: only the WORD "Able" gets the green underline swoosh.
       The favicon shows just the letter "A" so it does not include the swoosh. -->
  <rect width="64" height="64" rx="14" fill="#2a7a4a"/>
  <text class="a" x="32" y="48" text-anchor="middle" font-size="52" fill="#ffffff">A</text>
</svg>
