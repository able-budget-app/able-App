<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="canvas-size" content="1500x500">
<title>Able · cover-twitter</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_brand.css">
<style>
  /* Twitter/X profile pic overlaps lower-left ~100x100 at ~64px from corner.
     Push content right of avatar so it stays visible on mobile + desktop. */
  html, body { width: 1500px; height: 500px; margin: 0; padding: 0; background: #d9e8de; }
  .canvas {
    width: 1500px; height: 500px;
    padding: 56px 80px 56px 480px;
    --eyebrow-fs: 18px;
    --punch-fs: 76px;
    --wordmark-fs: 32px;
    --url-fs: 20px;
    align-items: center;
    text-align: center;
  }
  .canvas .footer { justify-content: center; gap: 20px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="eyebrow">For entrepreneurs</div>
    <div class="stack">
      <div class="punch">From Unable<br>&rarr; <span class="underline">Able.</span></div>
    </div>
    <div class="footer">
      <div class="wordmark">Able</div>
      <div class="url">becomeable.app</div>
    </div>
  </div>
</body>
</html>
