<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Get Able</title>
<link rel="canonical" href="https://becomeable.app/">
<style>
  html,body{margin:0;padding:0;background:#0b0b0b;color:#fafafa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;height:100%}
  .wrap{display:flex;align-items:center;justify-content:center;height:100%;text-align:center;padding:24px}
  a{color:#fafafa}
</style>
</head>
<body>
<script>
(function () {
  // Update iOS/Android when each store listing goes live.
  var IOS_URL     = '/app.html'; // future: 'https://apps.apple.com/app/able-inconsistent-income/id6769551407' (approved 2026-05-18, not yet released)
  var ANDROID_URL = '/app.html'; // future: 'https://play.google.com/store/apps/details?id=app.becomeable'
  var DESKTOP_URL = '/';         // desktop visitors land on marketing site, not straight into app

  var ua = (navigator.userAgent || '').toLowerCase();
  var isIPadOnMacUA = /macintosh/.test(ua) && navigator.maxTouchPoints > 1;
  var isIOS     = /iphone|ipad|ipod/.test(ua) || isIPadOnMacUA;
  var isAndroid = /android/.test(ua);

  var dest = isIOS ? IOS_URL : isAndroid ? ANDROID_URL : DESKTOP_URL;
  var qs = window.location.search || '';
  var hash = window.location.hash || '';
  window.location.replace(dest + qs + hash);
})();
</script>
<noscript>
  <meta http-equiv="refresh" content="0; url=/app.html">
  <div class="wrap"><p>Redirecting to <a href="/app.html">Able</a>&hellip;</p></div>
</noscript>
</body>
</html>
