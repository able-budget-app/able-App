<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>02 — Willpower</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800;12..96,900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --t1: #111c16;
    --t2: #4a5c52;
    --green: #2a7a4a;
    --f: 'Bricolage Grotesque', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #d9e8de;
    font-family: var(--f);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .post {
    width: 1080px;
    height: 1080px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 96px 96px 88px;
    box-shadow: 0 12px 40px rgba(0,0,0,.08);
  }

  .post::before {
    content: '';
    position: absolute;
    top: -260px;
    right: -260px;
    width: 720px;
    height: 720px;
    background: radial-gradient(circle, rgba(42,122,74,.07) 0%, rgba(42,122,74,0) 70%);
    pointer-events: none;
  }
  .post::after {
    content: '';
    position: absolute;
    bottom: -300px;
    left: -300px;
    width: 720px;
    height: 720px;
    background: radial-gradient(circle, rgba(42,122,74,.05) 0%, rgba(42,122,74,0) 70%);
    pointer-events: none;
  }

  .eyebrow {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--green);
    position: relative;
    z-index: 2;
  }

  .stack {
    margin-top: auto;
    margin-bottom: auto;
    position: relative;
    z-index: 2;
  }

  .muted {
    font-size: 64px;
    font-weight: 600;
    line-height: 1.08;
    letter-spacing: -.02em;
    color: var(--t2);
    margin-bottom: 36px;
  }

  .punch {
    font-size: 104px;
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: -.03em;
    color: var(--t1);
  }

  .underline {
    position: relative;
    display: inline-block;
    white-space: nowrap;
  }
  .underline::after {
    content: '';
    position: absolute;
    left: -1%;
    right: -1%;
    bottom: -14px;
    height: 18px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 4.2' preserveAspectRatio='none'><path d='M3 2.6 Q2 2.4 3 2.15 Q58 1.75 115 0.15 Q119 1 119 2 Q119 3 115 3.9 Q58 3.55 3 2.65 Q2 2.45 3 2.6 Z' fill='%232a7a4a'/></svg>") no-repeat center / 100% 100%;
  }

  .footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: relative;
    z-index: 2;
  }

  .wordmark {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -.03em;
    color: var(--t1);
    line-height: 1;
    position: relative;
    display: inline-block;
  }
  .wordmark::after {
    content: '';
    position: absolute;
    left: 0;
    right: -4%;
    bottom: -6px;
    height: 9px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 4.2' preserveAspectRatio='none'><path d='M3 2.6 Q2 2.4 3 2.15 Q58 1.75 115 0.15 Q119 1 119 2 Q119 3 115 3.9 Q58 3.55 3 2.65 Q2 2.45 3 2.6 Z' fill='%232a7a4a'/></svg>") no-repeat center / 100% 100%;
  }

  .url {
    font-size: 22px;
    font-weight: 700;
    color: var(--t2);
    letter-spacing: .01em;
    line-height: 1;
    padding-bottom: 6px;
  }
</style>
</head>
<body>
  <div class="post">
    <div class="eyebrow">For entrepreneurs</div>

    <div class="stack">
      <div class="muted">You don't have a willpower problem.</div>
      <div class="punch">You have a <span class="underline">structure</span><br>problem.</div>
    </div>

    <div class="footer">
      <div class="wordmark">Able</div>
      <div class="url">becomeable.app</div>
    </div>
  </div>
</body>
</html>
